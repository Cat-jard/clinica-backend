server:
  port: 8100

spring:
  application:
    name: laboratorio-service
  config:
    import: "optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}"
  cloud:
    compatibility-verifier:
      enabled: false
    openfeign:
      client:
        config:
          radiologia-service:
            connect-timeout: 5000
            read-timeout: 5000
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:sihce_laboratorio}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jpa:
    hibernate:
      # Flyway gestiona el esquema; Hibernate solo valida.
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
    open-in-view: false

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

radiologia:
  api:
    url: ${RADIOLOGIA_API_URL:http://localhost:8085}

management:
  endpoints:
    web:
      exposure:
        include: health,info
