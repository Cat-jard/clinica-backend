spring:
  application:
    name: citas-service
  datasource:
    url: jdbc:postgresql://localhost:5433/sihce_citas
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: admin
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  cloud:
    compatibility-verifier:
      enabled: false

server:
  port: 8002

logging:
  level:
    com.citas: DEBUG
    org.springframework.cloud.openfeign: DEBUG

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
