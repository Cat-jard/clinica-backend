server:
  port: 8086

spring:
  application:
    name: notificacion-service

  # RabbitMQ Configuration
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 10
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000

  # SMTP Configuration (Optional: falls back to logging if not running)
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025} # Default to Mailhog SMTP port
    username: ${SMTP_USER:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

# Eureka Discovery
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info

# Custom Notification Properties
notification:
  email:
    from: no-reply@clinica-sihce.com
    fromName: "Clínica Médica SIHCE"
  websocket:
    endpoint: "/ws-clinic"
    brokerPrefix: "/topic"
    userDestinationPrefix: "/user"
