server:
  port: 8083

spring:
  application:
    name: soporte-service

  # ----- Config Server (centralizado). Opcional: el servicio arranca aunque el Config Server este caido -----
  config:
    import: "optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}"

  # ----- PostgreSQL (BD relacional) -----
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:clinica_soporte}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:admin}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # Flyway gestiona el esquema; Hibernate solo valida que las entidades coincidan.
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false

  # ----- Flyway (migraciones) -----
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# ----- Eureka (descubrimiento de servicios) -----
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

# ----- Actuator -----
management:
  endpoints:
    web:
      exposure:
        include: health,info

# ----- Parametros propios del microservicio -----
app:
  jwt:
    # MISMA clave que usuario-service: este servicio solo VALIDA el token (no lo emite).
    secret: ${JWT_SECRET:Q2xpbmljYVNJSENFU2VjcmV0S2V5UGFyYUZpcm1hckpXVDIwMjZTZWd1cm9CYXNlNjQ=}
  seed:
    enabled: true
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000}
