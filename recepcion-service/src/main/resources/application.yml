spring:
  application:
    name: recepcion-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5453}/${DB_NAME:recepcion_db}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}

  # ----- RabbitMQ -----
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jpa:
    hibernate:
      # Flyway gestiona el esquema; Hibernate solo valida.
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  cloud:
    compatibility-verifier:
      enabled: false

server:
  port: 8001

logging:
  level:
    com.recepcion: DEBUG
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    # Si Eureka no esta levantado, no impide el arranque del servicio.
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true