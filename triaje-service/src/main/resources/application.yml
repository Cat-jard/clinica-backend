server:
  port: 8003

spring:
  application:
    name: triaje-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:sihce_triaje}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jpa:
    hibernate:
      # Flyway gestiona el esquema; Hibernate solo valida.
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true
    open-in-view: false
  cloud:
    compatibility-verifier:
      enabled: false
    openfeign:
      client:
        config:
          citas-service:
            connect-timeout: 5000
            read-timeout: 5000
          recepcion-service:
            connect-timeout: 5000
            read-timeout: 5000

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.triaje: DEBUG
    org.springframework.cloud.openfeign: DEBUG

citas:
  api:
    url: http://localhost:8002

recepcion:
  api:
    url: http://localhost:8001

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
