server:
  port: 8081

spring:
  application:
    name: usuario-service
  cloud:
    config:
      enabled: false

  # ----- Config Server (centralizado). Opcional: el servicio arranca aunque el Config Server este caido -----
  # config:
  #   import: "optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}"

  # ----- PostgreSQL (BD relacional) -----
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5445}/${DB_NAME:clinica_usuarios}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  # ----- RabbitMQ (Mensajeria asincrona) -----
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}

  jpa:
    hibernate:
      # Flyway gestiona el esquema; Hibernate solo valida que las entidades coincidan.
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false

  # ----- Flyway (migraciones) -----
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# ----- Eureka (descubrimiento de servicios) -----
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    # Si Eureka no esta levantado, no impide el arranque del servicio.
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

# ----- Actuator -----
management:
  endpoints:
    web:
      exposure:
        include: health,info

# ----- Parametros propios del microservicio -----
app:
  jwt:
    # Clave de 256 bits (base64). En produccion usar variable de entorno JWT_SECRET.
    secret: ${JWT_SECRET:Q2xpbmljYVNJSENFU2VjcmV0S2V5UGFyYUZpcm1hckpXVDIwMjZTZWd1cm9CYXNlNjQ=}
    expiration-ms: ${JWT_EXPIRATION_MS:28800000}   # 8 horas
  seed:
    enabled: true
    default-password: ${SEED_PASSWORD:Clinica123}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000}
