# =====================================================================
# Configuracion COMPARTIDA por todos los microservicios de la clinica.
# El Config Server la sirve bajo el nombre 'application', por lo que
# cada servicio la hereda automaticamente y puede sobreescribir valores
# en su propio <nombre-servicio>.yml.
# =====================================================================

# ----- Eureka (descubrimiento) -----
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

# ----- Actuator -----
management:
  endpoints:
    web:
      exposure:
        include: health,info

# ----- Parametros transversales -----
app:
  cors:
    # Origenes del frontend permitidos. Sobreescribir con CORS_ORIGINS en produccion.
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}
