server:
  port: 8001

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/recepcion_db
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

logging:
  level:
    com.recepcion: DEBUG
