server:
  port: 8761

spring:
  application:
    name: eureka-server

# ----- Configuracion del servidor Eureka -----
eureka:
  instance:
    hostname: localhost
  client:
    # El propio servidor no se registra ni consume su registro.
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/
  server:
    # En desarrollo desactivamos el modo de auto-preservacion para ver bajas rapido.
    enable-self-preservation: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
